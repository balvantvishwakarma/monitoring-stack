global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@balwantvishwakarma.me'
  smtp_auth_username: 'alerts@balwantvishwakarma.me'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 30m
      continue: true

    # Warning alerts - standard notification
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 1m
      repeat_interval: 4h

    # Kubernetes-specific routing
    - match_re:
        job: kubernetes-.*
      receiver: 'platform-team'
      group_by: ['namespace', 'pod']

    # Application-specific routing
    - match:
        team: applications
      receiver: 'app-team'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: 'critical-alerts'
    slack_configs:
      - channel: '#critical-alerts'
        send_resolved: true
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
        text: >
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
    email_configs:
      - to: 'oncall@balwantvishwakarma.me'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .GroupLabels.cluster }}'
        html: '{{ template "email.html" . }}'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        send_resolved: true
        severity: critical
        description: '{{ .GroupLabels.alertname }}'

  - name: 'warning-alerts'
    slack_configs:
      - channel: '#warnings'
        send_resolved: true
        title: ':warning: WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.text" . }}'

  - name: 'platform-team'
    slack_configs:
      - channel: '#platform-team'
        send_resolved: true
        title: 'Platform Alert: {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.text" . }}'

  - name: 'app-team'
    slack_configs:
      - channel: '#app-team'
        send_resolved: true
        title: 'App Alert: {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.text" . }}'
